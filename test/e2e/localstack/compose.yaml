services:
  localstack:
    image: localstack/localstack:4.14.0
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "${DEBUG:-}"
    ports:
      - "127.0.0.1:${E2E_LOCALSTACK_PORT:-4566}:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal secretsmanager list-secrets >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  openbao:
    image: ghcr.io/openbao/openbao:2.5.5@sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452
    cap_add:
      - IPC_LOCK
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      BAO_ADDR: http://127.0.0.1:8200
      BAO_TOKEN: root
    command:
      - server
      - -dev
      - -dev-root-token-id=root
      - -dev-listen-address=0.0.0.0:8200
      - -dev-plugin-dir=/openbao/plugins
    ports:
      - "127.0.0.1:${E2E_OPENBAO_PORT:-18200}:8200"
    volumes:
      - ../../../bin/e2e:/openbao/plugins:ro
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 5s
      retries: 30

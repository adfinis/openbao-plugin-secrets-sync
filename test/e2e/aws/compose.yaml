services:
  openbao:
    image: ghcr.io/openbao/openbao:2.6.0@sha256:900bb64d0671cd1d82b693c56206f7263b582445f3a3bb6ba6e5213f524a6653
    cap_add:
      - IPC_LOCK
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_SECURITY_TOKEN: ${AWS_SECURITY_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BAO_ADDR: http://127.0.0.1:8200
      BAO_TOKEN: root
    command:
      - server
      - -dev
      - -dev-root-token-id=root
      - -dev-listen-address=0.0.0.0:8200
      - -dev-plugin-dir=/openbao/plugins
    ports:
      - "127.0.0.1:${E2E_AWS_OPENBAO_PORT:-18201}:8200"
    volumes:
      - ../../../bin/e2e:/openbao/plugins:ro
      - ${E2E_AWS_WEB_IDENTITY_TOKEN_FILE_HOST:-./fixtures/empty-web-identity-token}:${E2E_AWS_WEB_IDENTITY_TOKEN_FILE:-/openbao/aws-web-identity-token}:ro
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 5s
      retries: 30

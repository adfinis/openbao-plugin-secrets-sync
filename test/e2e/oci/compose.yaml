services:
  registry:
    image: registry:2
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/registry.crt
      REGISTRY_HTTP_TLS_KEY: /certs/registry.key
    ports:
      - "127.0.0.1:${E2E_OCI_REGISTRY_PORT:-15000}:5000"
    volumes:
      - ../../../dist/e2e/oci/certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O - https://127.0.0.1:5000/v2/ >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  localstack:
    image: localstack/localstack:4.14.0
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "${DEBUG:-}"
    ports:
      - "127.0.0.1:${E2E_LOCALSTACK_PORT:-4566}:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal secretsmanager list-secrets >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  plugin-dir:
    image: ${E2E_OPENBAO_IMAGE:-ghcr.io/openbao/openbao:2.5.5@sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452}
    user: "0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /openbao/plugins && chown -R 100:1000 /openbao/plugins && chmod 0755 /openbao/plugins"
    volumes:
      - openbao-plugins:/openbao/plugins

  openbao:
    image: ${E2E_OPENBAO_IMAGE:-ghcr.io/openbao/openbao:2.5.5@sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452}
    cap_add:
      - IPC_LOCK
    depends_on:
      localstack:
        condition: service_healthy
      registry:
        condition: service_healthy
      plugin-dir:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      BAO_ADDR: http://127.0.0.1:8200
      BAO_TOKEN: root
      BAO_DEV_ROOT_TOKEN_ID: root
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SSL_CERT_FILE: /openbao/oci/ca.crt
    command:
      - server
      - -dev
    ports:
      - "127.0.0.1:${E2E_OCI_OPENBAO_PORT:-18204}:8200"
    volumes:
      - ../../../dist/e2e/oci/openbao.hcl:/openbao/config/openbao.hcl:ro
      - ../../../dist/e2e/oci/certs/ca.crt:/openbao/oci/ca.crt:ro
      - openbao-plugins:/openbao/plugins
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  openbao-plugins:

apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-plugin-secrets-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-plugin-secrets-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-plugin-secrets-sync
subjects:
  - kind: ServiceAccount
    name: openbao
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: openbao-plugin-secrets-sync-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
        app.kubernetes.io/part-of: openbao-plugin-secrets-sync-e2e
    spec:
      serviceAccountName: openbao
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        fsGroup: 100
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openbao
          image: openbao-plugin-secrets-sync-e2e:dev
          imagePullPolicy: IfNotPresent
          args:
            - server
            - -dev
            - -dev-root-token-id=root
            - -dev-listen-address=0.0.0.0:8200
            - -dev-plugin-dir=/openbao/plugins
          env:
            - name: BAO_ADDR
              value: http://127.0.0.1:8200
            - name: BAO_TOKEN
              value: root
          ports:
            - name: http
              containerPort: 8200
          volumeMounts:
            - name: openbao-home
              mountPath: /home/openbao
            - name: openbao-tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command:
                - bao
                - status
                - -address=http://127.0.0.1:8200
            periodSeconds: 2
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
      volumes:
        - name: openbao-home
          emptyDir: {}
        - name: openbao-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: openbao-plugin-secrets-sync-e2e
spec:
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: http

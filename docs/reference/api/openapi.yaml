        tls_server_name:
          type: string
          description: Optional Kubernetes API TLS server name override for token auth.
        base_url:
          type: string
          format: uri
          default: https://gitlab.com
        project_id:
          type: string
        environment_scope:
          type: string
          default: "*"
        protected:

          items:
            $ref: "#/components/schemas/DiagnosticAction"

    RemoteStateVerification:
      type: string
      enum: ["", value, metadata]
      description: Remote state signal used to verify drift; empty means no remote verification was available.

    ProviderErrorClass:
      type: string
      enum:
        - validation
        - authn
        - authz
        - rate_limit
        - unavailable
        - collision
        - ownership
        - drift
        - capacity
        - internal

    SyncState:
      type: string
      enum:
        - UNKNOWN
        - PENDING
        - SYNCED
        - DISABLED
        - NO_ASSOCIATION
        - REMOTE_MISSING
        - REMOTE_OWNERSHIP_LOST
        - DESTINATION_AUTH_ERROR
        - DESTINATION_POLICY_ERROR
        - DESTINATION_RATE_LIMITED
        - DESTINATION_UNAVAILABLE
        - VALIDATION_ERROR
        - QUEUE_BLOCKED
        - DRIFTED

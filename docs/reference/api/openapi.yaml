          description: Pause background remote mutations when true.
        restore_guard:
          type: boolean
          description: Require explicit acknowledgement before remote mutation.
        queue_capacity:
          type: integer
          minimum: 0
          default: 1000
          description: Maximum queued operations; 0 rejects new enqueue-producing writes.

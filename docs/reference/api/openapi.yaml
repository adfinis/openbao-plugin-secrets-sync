openapi: 3.1.0
info:
  title: OpenBao Secret Sync API
  version: 0.0.0-draft
  description: |
    Draft inspection spec for the OpenBao Secret Sync plugin HTTP API.

    The plugin is mounted under an OpenBao logical mount. The default examples
    use `secret-sync/`, so paths below are relative to `/v1/secret-sync`.
    This spec is an API review artifact while the plugin is pre-release. It is
    not a generated client compatibility promise yet.
servers:
  - url: http://127.0.0.1:8200/v1/secret-sync
    description: Local OpenBao dev server with the plugin mounted at secret-sync.
security:
  - OpenBaoToken: []
tags:
  - name: info
  - name: config
  - name: destinations
  - name: sources
  - name: source-data
  - name: metadata
  - name: associations
  - name: queue
  - name: status
  - name: reconcile
paths:
  /info:
    get:
      tags: [info]
      operationId: readInfo
      summary: Read static plugin information, defaults, and provider capabilities.
      x-openbao-operation: read
      responses:
        "200":
          description: Static plugin information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"

  /config:
    get:
      tags: [config]
      operationId: readConfig
      summary: Read mount-wide secret sync configuration.
      x-openbao-operation: read
      responses:
        "200":
          description: Current configuration and runtime identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
    post:
      tags: [config]
      operationId: writeConfig
      summary: Update mount-wide secret sync configuration.
      description: Applies a partial update. Omitted fields retain their stored values, including across concurrent requests handled by one mount process.
      x-openbao-operation: update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigWriteRequest"
      responses:
        "200":
          description: Configuration updated. Empty response body on success.

  /config/restore-guard/acknowledge:
    post:
      tags: [config]
      operationId: acknowledgeRestoreGuard
      summary: Acknowledge restore guard and resume remote mutation.
      x-openbao-operation: update
      responses:
        "200":
          description: Updated restore guard state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

  /destinations/{type}:
    get:
      tags: [destinations]
      operationId: listDestinations
      summary: List configured destination names for a provider type.
      x-openbao-operation: list
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/PaginationAfter"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Destination names.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /destinations/{type}/{name}:
    get:
      tags: [destinations]
      operationId: readDestination
      summary: Read one destination configuration.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "200":
          description: Destination configuration with sensitive fields redacted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationResponse"
    post:
      tags: [destinations]
      operationId: writeDestination
      summary: Create or update one destination configuration.
      description: Validates merged provider config before storage. On update, omitted fields inherit their stored values. Non-empty fields outside the selected provider type are rejected.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationWriteRequest"
      responses:
        "200":
          description: Destination validated and stored. Empty response body on success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOpenBaoResponse"
    delete:
      tags: [destinations]
      operationId: deleteDestination
      summary: Delete one destination when no associations reference it.
      x-openbao-operation: delete
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "204":
          description: Destination deleted or absent.

  /destinations/{type}/{name}/check:
    get:
      tags: [destinations]
      operationId: checkDestination
      summary: Check destination readiness.
      description: Combines provider validation and health into a single non-mutating readiness response.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "200":
          description: Destination readiness result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationCheckResponse"

  /destinations/{type}/{name}/validate:
    get:
      tags: [destinations]
      operationId: validateDestination
      summary: Validate static destination configuration.
      description: Non-mutating provider validation. The POST form is kept for OpenBao CLI compatibility.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationValidationResponse"
    post:
      tags: [destinations]
      operationId: validateDestinationPost
      summary: Validate static destination configuration.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationValidationResponse"

  /destinations/{type}/{name}/health:
    get:
      tags: [destinations]
      operationId: readDestinationHealth
      summary: Check destination reachability and provider authorization.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/DestinationType"
        - $ref: "#/components/parameters/DestinationName"
      responses:
        "200":
          description: Destination health result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationHealthResponse"

  /sources/{path}/check:
    get:
      tags: [sources]
      operationId: checkSource
      summary: Check source readiness.
      description: Reports whether a source has an available current version and, when required by hardened posture, source sync enabled.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Source readiness result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceCheckResponse"

  /sources/{path}/enable:
    post:
      tags: [sources]
      operationId: enableSource
      summary: Enable source sync and enqueue current source work.
      description: Enables source sync for the path and, when the state changes, enqueues the current source version for enabled associations with active destinations.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Source sync metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSyncResponse"

  /sources/{path}/disable:
    post:
      tags: [sources]
      operationId: disableSource
      summary: Disable source sync for a path.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Source sync metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSyncResponse"

  /metadata:
    get:
      tags: [metadata]
      operationId: listMetadataRoot
      summary: List root source metadata keys.
      x-openbao-operation: list
      parameters:
        - $ref: "#/components/parameters/PaginationAfter"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Metadata keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /metadata/{path}:
    get:
      tags: [metadata]
      operationId: readMetadata
      summary: Read source metadata, or list metadata keys for a prefix.
      x-openbao-operations: [read, list]
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/PaginationAfter"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Source metadata or key list.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MetadataResponse"
                  - $ref: "#/components/schemas/ListResponse"
    post:
      tags: [metadata]
      operationId: writeMetadata
      summary: Create or update source metadata.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataWriteRequest"
      responses:
        "200":
          description: Updated metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
    delete:
      tags: [metadata]
      operationId: deleteMetadata
      summary: Delete source metadata and versions when no associations exist.
      x-openbao-operation: delete
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "204":
          description: Metadata deleted or absent.

  /data/{path}:
    get:
      tags: [source-data]
      operationId: readSourceData
      summary: Read a local source secret version.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - name: version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Version to read. Defaults to latest.
      responses:
        "200":
          description: Source data and version metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceDataResponse"
    post:
      tags: [source-data]
      operationId: writeSourceData
      summary: Write a new local source secret version.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceDataWriteRequest"
      responses:
        "200":
          description: New source version and sync enqueue metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceDataWriteResponse"
    delete:
      tags: [source-data]
      operationId: deleteLatestSourceData
      summary: Soft-delete the latest local source secret version.
      description: Cancels queued upserts for the latest version and enqueues remote deletes for associations with `delete_mode=delete`.
      x-openbao-operation: delete
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Delete enqueue metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceDeleteResponse"

  /delete/{path}:
    post:
      tags: [source-data]
      operationId: softDeleteSourceVersions
      summary: Soft-delete selected local source versions.
      description: When the current version is selected, queued upserts are canceled and remote deletes are enqueued for associations with `delete_mode=delete`.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionMutationRequest"
      responses:
        "200":
          description: Versions soft-deleted. Empty body on success.

  /undelete/{path}:
    post:
      tags: [source-data]
      operationId: undeleteSourceVersions
      summary: Undelete selected local source versions.
      description: When the current version is selected, replacement upserts are enqueued for enabled associations.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionMutationRequest"
      responses:
        "200":
          description: Versions undeleted. Empty body on success.

  /destroy/{path}:
    post:
      tags: [source-data]
      operationId: destroySourceVersions
      summary: Permanently destroy selected local source versions.
      description: When the current version is selected, queued upserts are canceled and remote deletes are enqueued for associations with `delete_mode=delete`.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionMutationRequest"
      responses:
        "200":
          description: Versions destroyed. Empty body on success.

  /associations:
    get:
      tags: [associations]
      operationId: listAssociationPrefixes
      summary: List source path prefixes with associations.
      x-openbao-operation: list
      parameters:
        - $ref: "#/components/parameters/PaginationAfter"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Association source path prefixes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /associations/{path}:
    get:
      tags: [associations]
      operationId: readAssociations
      summary: Read associations for one source path.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Associations for the source path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationsResponse"
    post:
      tags: [associations]
      operationId: writeAssociation
      summary: Create or update a source-to-destination association.
      description: On update, omitted optional fields inherit stored values when the source path and destination identify exactly one existing association. Enabling an existing disabled association queues the current source version.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationWriteRequest"
      responses:
        "200":
          description: Association and queued sync operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/plan:
    post:
      tags: [associations]
      operationId: planAssociation
      summary: Plan an association without mutating remote state.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationWriteRequest"
      responses:
        "200":
          description: Provider plan using effective association defaults.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationPlanResponse"

  /associations/{path}/{association_id}:
    get:
      tags: [associations]
      operationId: readAssociation
      summary: Read one association.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/AssociationID"
      responses:
        "200":
          description: Association details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationResponse"
    delete:
      tags: [associations]
      operationId: deleteAssociation
      summary: Delete an association without deleting remote state.
      x-openbao-operation: delete
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/AssociationID"
      responses:
        "204":
          description: Association deleted or absent.

  /associations/{path}/disable:
    post:
      tags: [associations]
      operationId: disableAssociationByDestination
      summary: Disable an association resolved by destination and cancel queued work.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationDestinationRequest"
      responses:
        "200":
          description: Disabled association and canceled operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/enable:
    post:
      tags: [associations]
      operationId: enableAssociationByDestination
      summary: Enable an association resolved by destination and enqueue the current source version.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationDestinationRequest"
      responses:
        "200":
          description: Enabled association and queued sync operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/sync:
    post:
      tags: [associations]
      operationId: syncAssociationByDestination
      summary: Manually enqueue sync for one enabled association resolved by destination.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationDestinationRequest"
      responses:
        "200":
          description: Association and queued sync operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/{association_id}/disable:
    post:
      tags: [associations]
      operationId: disableAssociation
      summary: Disable an association and cancel queued work.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/AssociationID"
      responses:
        "200":
          description: Disabled association and canceled operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/{association_id}/enable:
    post:
      tags: [associations]
      operationId: enableAssociation
      summary: Enable an association and enqueue the current source version.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/AssociationID"
      responses:
        "200":
          description: Enabled association and queued sync operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /associations/{path}/{association_id}/sync:
    post:
      tags: [associations]
      operationId: syncAssociation
      summary: Manually enqueue sync for one enabled association.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
        - $ref: "#/components/parameters/AssociationID"
      responses:
        "200":
          description: Association and queued sync operation ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationLifecycleResponse"

  /status/{path}:
    get:
      tags: [status]
      operationId: readStatus
      summary: Read per-source sync status.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Current source and per-object sync status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /queue:
    get:
      tags: [queue]
      operationId: readQueue
      summary: Read durable queue summary.
      x-openbao-operation: read
      responses:
        "200":
          description: Queue counters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueSummaryResponse"

  /queue/drain:
    post:
      tags: [queue]
      operationId: drainQueue
      summary: Process due queue operations.
      x-openbao-operation: update
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueDrainRequest"
      responses:
        "200":
          description: Drain result and queue counters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueDrainResponse"

  /queue/{operation_id}:
    get:
      tags: [queue]
      operationId: readQueueOperation
      summary: Read one queue operation.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200":
          description: Durable queue operation without source payload data. Successful operations are pruned after status persistence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueOperationResponse"

  /queue/{operation_id}/retry:
    post:
      tags: [queue]
      operationId: retryQueueOperation
      summary: Retry one retry-wait or terminal failed queue operation.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200":
          description: Operation moved back to pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueOperationResponse"

  /queue/{operation_id}/cancel:
    post:
      tags: [queue]
      operationId: cancelQueueOperation
      summary: Discard one pending or retry-wait operation.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200":
          description: Canceled operation snapshot. The operation is removed from durable queue storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueOperationResponse"

  /reconcile/{path}/plan:
    get:
      tags: [reconcile]
      operationId: planReconcile
      summary: Read remote state and plan status reconciliation.
      x-openbao-operation: read
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Reconcile plan. Remote objects are not mutated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResponse"

  /reconcile/{path}:
    post:
      tags: [reconcile]
      operationId: applyReconcile
      summary: Read remote state and update local status records.
      x-openbao-operation: update
      parameters:
        - $ref: "#/components/parameters/SourcePath"
      responses:
        "200":
          description: Applied reconcile result. Remote objects are not mutated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResponse"

components:
  securitySchemes:
    OpenBaoToken:
      type: apiKey
      in: header
      name: X-Vault-Token
      description: OpenBao token header. OpenBao keeps the Vault-compatible header name.

  parameters:
    DestinationType:
      name: type
      in: path
      required: true
      schema:
        type: string
        enum: [aws-sm, k8s, gitlab]
      description: Destination provider type.
    DestinationName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Destination name.
    SourcePath:
      name: path
      in: path
      required: true
      x-openbao-match-all: true
      schema:
        type: string
        example: app/db
      description: Slash-containing OpenBao source path. Clients may need to preserve or encode slashes. Segments must not be empty, `.`, `..`, or `versions`; the path must not end in `plan`, `disable`, `enable`, or `sync`.
    AssociationID:
      name: association_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^assoc-[0-9a-f]{32}$
      description: Association id returned by association create or read.
    OperationID:
      name: operation_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^op-[0-9a-f]+-[0-9]+$
      description: Queue operation id.
    PaginationAfter:
      name: after
      in: query
      required: false
      schema:
        type: string
      description: Optional entry to begin listing after. The entry does not need to exist in the result set.
    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
      description: Optional maximum number of entries to return. Non-positive values return all entries.

  schemas:
    OpenBaoErrors:
      type: object
      properties:
        errors:
          type: array
          description: Error strings. Diagnostic errors include a CLI-readable hint and first next-action command.
          items:
            type: string
        data:
          $ref: "#/components/schemas/OperatorDiagnostic"
      required: [errors]

    OperatorDiagnostic:
      type: object
      properties:
        hint:
          type: string
          description: Human-readable recovery hint for blocked or terminal states.
        next_actions:
          type: array
          description: Structured operator actions that can be shown by clients or used by automation.
          items:
            $ref: "#/components/schemas/DiagnosticAction"

    DiagnosticAction:
      type: object
      properties:
        action:
          type: string
          description: Stable action identifier.
        operation:
          type: string
          enum: [read, write]
        path:
          type: string
          description: Plugin-relative path for the action.
        parameters:
          type: object
          additionalProperties:
            type: string
        force:
          type: boolean

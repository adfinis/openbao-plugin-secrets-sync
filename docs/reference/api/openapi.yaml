    AssociationWriteRequest:
      type: object
      description: Create defaults apply to new associations. Updates inherit omitted optional fields from the matching stored association when path and destination are unambiguous. Setting enabled=true on an existing disabled association queues the current source version.
      properties:
        destination:
          type: string
          pattern: ^[^/]+/[^/]+$
          description: Destination reference in `<type>/<name>` form.
        resolved_name:
          type: string
          description: Explicit remote object name for secret-path granularity.
        name_template:
          type: string
          default: "{{ path }}"
          description: Remote name template. Secret-key granularity requires `{{ key }}`.
        granularity:
          type: string
          enum: [secret-path, secret-key]
          default: secret-path
        format:
          type: string
          enum: [json, raw]
          default: json
        data_mapping:
          type: string
          enum: [payload, source-keys]
          default: payload
          description: Destination data mapping mode. source-keys maps top-level source keys into destination-native data keys when supported.
        data_key_template:
          type: string
          default: ""
          description: Destination-native data key template for data_mapping source-keys. Requires `{{ key }}`.
        delete_mode:
          type: string
          enum: [retain, delete, orphan]
          default: retain
        enabled:
          type: boolean
          default: true
      required: [destination]
      additionalProperties: false


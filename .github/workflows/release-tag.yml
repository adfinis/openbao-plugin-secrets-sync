name: Release Tag

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
      - 'release-notes/**'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-please-tag
  cancel-in-progress: true

jobs:
  release-tag:
    name: Create Signed Tag And Draft Release
    runs-on: ubuntu-24.04
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Check release tag secrets
        id: release-tag-secrets
        env:
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL }}
        run: |
          set -euo pipefail

          missing=()
          for var in \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL
          do
            if [[ -z "${!var}" ]]; then
              missing+=("${var}")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::release tag skipped because these required secrets are not configured: ${missing[*]}"
          fi

      - name: Checkout
        if: ${{ steps.release-tag-secrets.outputs.configured == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Import release tag signing key
        if: ${{ steps.release-tag-secrets.outputs.configured == 'true' }}
        env:
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL }}
        run: |
          set -euo pipefail

          for var in \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME \
            OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL
          do
            if [[ -z "${!var}" ]]; then
              echo "${var} is required for signed release tags" >&2
              exit 1
            fi
          done

          export GNUPGHOME="${RUNNER_TEMP}/release-tag-gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"

          printf '%s' "${OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PRIVATE_KEY}" | gpg --batch --import

          fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '$1=="fpr"{print $10; exit}')"
          if [[ -z "${fingerprint}" ]]; then
            echo "failed to resolve imported GPG signing key fingerprint" >&2
            exit 1
          fi

          gpg_wrapper="${RUNNER_TEMP}/gpg-loopback.sh"
          printf '%s\n' \
            "#!/usr/bin/env bash" \
            "exec gpg --batch --yes --pinentry-mode loopback --passphrase \"\${OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE}\" \"\$@\"" \
            > "${gpg_wrapper}"
          chmod 700 "${gpg_wrapper}"

          git config --global user.name "${OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_NAME}"
          git config --global user.email "${OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_EMAIL}"
          git config --global user.signingkey "${fingerprint}"
          git config --global gpg.program "${gpg_wrapper}"

          {
            echo "GNUPGHOME=${GNUPGHOME}"
            echo "RELEASE_TAG_SIGNING_FINGERPRINT=${fingerprint}"
          } >> "${GITHUB_ENV}"

      - name: Create tag and draft release
        id: release_tag
        if: ${{ steps.release-tag-secrets.outputs.configured == 'true' }}
        env:
          REPO: ${{ github.repository }}
          BEFORE_SHA: ${{ github.event.before }}
          GH_READ_TOKEN: ${{ github.token }}
          GH_WRITE_TOKEN: ${{ github.token }}
          OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE: ${{ secrets.OPENBAO_SECRET_SYNC_RELEASE_TAG_GPG_PASSPHRASE }}
        run: bash hack/ci/create-release-tag-and-draft.sh

      - name: Dispatch release artifact workflow
        if: ${{ steps.release-tag-secrets.outputs.configured == 'true' && steps.release_tag.outputs.release_ready == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="$(jq -er '."."' .release-please-manifest.json)"
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "release version must be a semver tag without build metadata, got ${version}" >&2
            exit 1
          fi

          release_is_draft="$(gh release view "${version}" --repo "${REPO}" --json isDraft --jq '.isDraft')"
          if [[ "${release_is_draft}" != "true" ]]; then
            echo "release ${version} is already published; skipping artifact dispatch"
            exit 0
          fi

          tag_commit="$(git rev-list -n1 "${version}")"
          payload="$(
            jq -cn \
              --arg tag "${version}" \
              --arg commit "${tag_commit}" \
              --arg source_repository "${REPO}" \
              --arg source_run_id "${GITHUB_RUN_ID}" \
              '{
                event_type: "release-artifacts",
                client_payload: {
                  tag: $tag,
                  commit: $commit,
                  source_workflow: "release-tag",
                  source_repository: $source_repository,
                  source_run_id: $source_run_id
                }
              }'
          )"

          gh api "repos/${REPO}/dispatches" --method POST --input - <<<"${payload}"

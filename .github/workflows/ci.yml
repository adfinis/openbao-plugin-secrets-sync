name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools
        with:
          cache-tools: "false"
          bootstrap-tools: "false"

      - name: Run fast checks
        run: make ci-fast

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SEMGREP_VERSION: "1.157.0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools

      - name: Install Semgrep
        run: |
          python3 -m venv .venv-semgrep
          . .venv-semgrep/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "semgrep==${SEMGREP_VERSION}"
          echo "${GITHUB_WORKSPACE}/.venv-semgrep/bin" >> "${GITHUB_PATH}"

      - name: Run lint checks
        run: make lint

  security:
    name: Security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.69.3

      - name: Run security checks
        run: make security-ci

  heavy:
    name: Race, Fuzz, Release Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools

      - name: Run heavy checks
        run: make ci-heavy

  localstack-e2e:
    name: LocalStack E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools
        with:
          cache-tools: "false"
          bootstrap-tools: "false"

      - name: Run LocalStack e2e
        run: make test-e2e

  kind-e2e:
    name: Kubernetes Kind E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      KIND_VERSION: "v0.31.0"
      KUBECTL_VERSION: "v1.35.3"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools
        with:
          cache-tools: "false"
          bootstrap-tools: "false"

      - name: Install kind and kubectl
        run: |
          set -euo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/bin"
          GOBIN="${GITHUB_WORKSPACE}/bin" go install "sigs.k8s.io/kind@${KIND_VERSION}"
          curl -fsSLo "${GITHUB_WORKSPACE}/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLo "${GITHUB_WORKSPACE}/bin/kubectl.sha256" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          cd "${GITHUB_WORKSPACE}"
          echo "$(cat bin/kubectl.sha256)  bin/kubectl" | sha256sum -c -
          chmod +x bin/kubectl

      - name: Run Kubernetes kind e2e
        run: make test-e2e-kind

  resilience-e2e:
    name: OpenBao Lifecycle E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools
        with:
          cache-tools: "false"
          bootstrap-tools: "false"

      - name: Run OpenBao lifecycle e2e
        run: make test-e2e-resilience

  core:
    name: Core Quality
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - fast
      - lint
      - security
      - heavy
      - localstack-e2e
      - kind-e2e
      - resilience-e2e
    steps:
      - name: Validate required CI graph
        env:
          FAST: ${{ needs.fast.result }}
          LINT: ${{ needs.lint.result }}
          SECURITY: ${{ needs.security.result }}
          HEAVY: ${{ needs.heavy.result }}
          LOCALSTACK_E2E: ${{ needs.localstack-e2e.result }}
          KIND_E2E: ${{ needs.kind-e2e.result }}
          RESILIENCE_E2E: ${{ needs.resilience-e2e.result }}
        run: |
          set -euo pipefail

          failures=()
          while IFS='=' read -r job result; do
            case "${result}" in
              success)
                ;;
              *)
                failures+=("${job}:${result}")
                ;;
            esac
          done <<EOF
          fast=${FAST}
          lint=${LINT}
          security=${SECURITY}
          heavy=${HEAVY}
          localstack-e2e=${LOCALSTACK_E2E}
          kind-e2e=${KIND_E2E}
          resilience-e2e=${RESILIENCE_E2E}
          EOF

          if [ "${#failures[@]}" -gt 0 ]; then
            printf 'Required CI graph failures:\n' >&2
            printf '  - %s\n' "${failures[@]}" >&2
            exit 1
          fi

          echo "Required CI graph completed successfully."

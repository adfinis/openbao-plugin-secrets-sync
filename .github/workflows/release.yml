name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to build, for example 0.1.0-preview.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  artifacts:
    name: Build And Upload Plugin Artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve release ref
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_TAG}"
            ref="refs/tags/${INPUT_TAG}"
          else
            version="${REF_NAME}"
            ref="refs/tags/${REF_NAME}"
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\-+].*)?$ ]]; then
            echo "version must be a semver tag, got ${version}" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "ref=${ref}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.ref }}
          fetch-depth: 0

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools
        with:
          bootstrap-tools: "false"

      - name: Compute build metadata
        id: metadata
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          build_date="$(date -u -d "@${source_date_epoch}" +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "commit=${sha}"
            echo "source_date_epoch=${source_date_epoch}"
            echo "build_date=${build_date}"
          } >> "${GITHUB_OUTPUT}"

      - name: Require draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 24); do
            release_json="$(gh release view "${VERSION}" --json isDraft,isPrerelease,name 2>/dev/null || true)"
            if [[ -n "${release_json}" ]]; then
              if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
                echo "GitHub Release '${VERSION}' already exists but is not a draft." >&2
                echo "Release assets are immutable after publication; create releases through the release-tag workflow." >&2
                exit 1
              fi
              echo "Found draft GitHub Release ${VERSION}"
              exit 0
            fi
            sleep 5
          done
          echo "Draft GitHub Release '${VERSION}' not found after waiting." >&2
          echo "Merge the release-please PR and allow the Release Tag workflow to create the signed tag and draft release." >&2
          exit 1

      - name: Build release artifacts
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        run: |
          make release-artifacts \
            VERSION="${{ steps.release.outputs.version }}" \
            COMMIT="${{ steps.metadata.outputs.commit }}" \
            BUILD_DATE="${{ steps.metadata.outputs.build_date }}" \
            DIRTY=false

      - name: Verify checksums
        run: cd dist/release && shasum -a 256 -c checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.4

      - name: Attest checksums provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/release/checksums.txt

      - name: Attest release asset provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/release/checksums.txt

      - name: Record private dry-run attestation limitation
        if: ${{ github.event.repository.private }}
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          GitHub release artifact attestations were skipped because this is a private repository dry run. Public release tags must run with attestations enabled.
          EOF

      - name: Sign release checksums
        run: |
          cosign sign-blob \
            --yes \
            --new-bundle-format=true \
            --bundle dist/release/checksums.txt.bundle \
            dist/release/checksums.txt

      - name: Verify release checksums signature
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          cosign verify-blob \
            --new-bundle-format=true \
            --bundle dist/release/checksums.txt.bundle \
            --certificate-identity "https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${VERSION}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/release/checksums.txt >/dev/null

      - name: Verify release asset attestations
        if: ${{ !github.event.repository.private }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
        run: bash hack/ci/verify-release-artifact-attestations.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-plugin-artifacts-${{ steps.release.outputs.version }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "${VERSION}" --json isDraft,assets)"
          release_is_draft="$(jq -r '.isDraft' <<<"${release_json}")"
          declare -A existing_asset_sizes=()
          while IFS=$'\t' read -r name size; do
            if [[ -n "${name}" ]]; then
              existing_asset_sizes["${name}"]="${size}"
            fi
          done < <(jq -r '.assets[]? | [.name, (.size|tostring)] | @tsv' <<<"${release_json}")

          tmp_existing="$(mktemp -d)"
          trap 'rm -rf "${tmp_existing}"' EXIT

          shopt -s nullglob
          to_upload=()
          for file in dist/release/*; do
            name="$(basename "${file}")"
            if [[ -n "${existing_asset_sizes[${name}]-}" ]]; then
              local_size="$(stat -c%s "${file}")"
              if [[ "${local_size}" != "${existing_asset_sizes[${name}]}" ]]; then
                echo "Release asset '${name}' already exists but size differs." >&2
                exit 1
              fi
              gh release download "${VERSION}" --pattern "${name}" --dir "${tmp_existing}"
              local_sha="$(sha256sum "${file}" | awk '{print $1}')"
              release_sha="$(sha256sum "${tmp_existing}/${name}" | awk '{print $1}')"
              if [[ "${local_sha}" != "${release_sha}" ]]; then
                echo "Release asset '${name}' already exists but content differs." >&2
                exit 1
              fi
              continue
            fi
            to_upload+=("${file}")
          done

          if (( ${#to_upload[@]} > 0 )); then
            if [[ "${release_is_draft}" != "true" ]]; then
              echo "Release '${VERSION}' is already published and missing one or more local assets." >&2
              echo "Refusing to mutate a published release." >&2
              exit 1
            fi
            gh release upload "${VERSION}" "${to_upload[@]}"
          fi

name: Release

on:
  repository_dispatch:
    types:
      - release-artifacts
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to build, for example 0.1.0-preview.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
  cancel-in-progress: false

jobs:
  manual-approval:
    name: Approve Manual Release Recovery
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: release-manual
    permissions: {}
    steps:
      - name: Confirm protected manual release recovery
        run: echo "Manual release recovery approved for ${{ inputs.tag }}"

  artifacts:
    name: Build And Upload Plugin Artifacts
    runs-on: ubuntu-24.04
    needs:
      - manual-approval
    if: ${{ always() && !cancelled() && !github.event.repository.fork && (github.event_name != 'workflow_dispatch' || needs.manual-approval.result == 'success') }}
    steps:
      - name: Resolve release ref
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          PAYLOAD_TAG: ${{ github.event.client_payload.tag }}
          PAYLOAD_COMMIT: ${{ github.event.client_payload.commit }}
          PAYLOAD_SOURCE_WORKFLOW: ${{ github.event.client_payload.source_workflow }}
          PAYLOAD_SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_TAG}"
            expected_commit=""
          elif [[ "${EVENT_NAME}" == "repository_dispatch" ]]; then
            if [[ "${ACTOR}" != "github-actions[bot]" ]]; then
              echo "repository_dispatch releases must be triggered by github-actions[bot], got ${ACTOR}" >&2
              exit 1
            fi
            if [[ "${PAYLOAD_SOURCE_WORKFLOW}" != "release-tag" ]]; then
              echo "repository_dispatch source_workflow must be release-tag, got ${PAYLOAD_SOURCE_WORKFLOW}" >&2
              exit 1
            fi
            if [[ "${PAYLOAD_SOURCE_REPOSITORY}" != "${REPOSITORY}" ]]; then
              echo "repository_dispatch source_repository must be ${REPOSITORY}, got ${PAYLOAD_SOURCE_REPOSITORY}" >&2
              exit 1
            fi
            if [[ -z "${PAYLOAD_TAG}" || -z "${PAYLOAD_COMMIT}" ]]; then
              echo "repository_dispatch payload must include tag and commit" >&2
              exit 1
            fi
            version="${PAYLOAD_TAG}"
            expected_commit="${PAYLOAD_COMMIT}"
          else
            echo "unsupported release event ${EVENT_NAME}" >&2
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "version must be a semver tag without build metadata, got ${version}" >&2
            echo "OCI image tags cannot contain '+', so release tags with semver build metadata are not supported." >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "ref=refs/tags/${version}"
            echo "expected_commit=${expected_commit}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.ref }}
          fetch-depth: 0

      - name: Verify release tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_COMMIT: ${{ steps.release.outputs.expected_commit }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${VERSION}:refs/tags/${VERSION}"

          if ! git rev-parse -q --verify "${VERSION}^{tag}" >/dev/null; then
            echo "release tag ${VERSION} must be an annotated tag" >&2
            exit 1
          fi

          if ! git cat-file tag "${VERSION}^{tag}" | grep -q "BEGIN PGP SIGNATURE"; then
            echo "release tag ${VERSION} must include a PGP signature" >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n1 "${VERSION}")"
          if [[ -n "${EXPECTED_COMMIT}" && "${tag_commit}" != "${EXPECTED_COMMIT}" ]]; then
            echo "release tag ${VERSION} points at ${tag_commit}, expected ${EXPECTED_COMMIT}" >&2
            exit 1
          fi

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools

      - name: Install Semgrep
        env:
          SEMGREP_VERSION: "1.157.0"
        run: |
          python3 -m venv .venv-semgrep
          . .venv-semgrep/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "semgrep==${SEMGREP_VERSION}"
          echo "${GITHUB_WORKSPACE}/.venv-semgrep/bin" >> "${GITHUB_PATH}"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.69.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.31.1

      - name: Run release source gates
        run: make lint-ci security-ci test test-race fuzz

      - name: Compute build metadata
        id: metadata
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          build_date="$(date -u -d "@${source_date_epoch}" +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "commit=${sha}"
            echo "source_date_epoch=${source_date_epoch}"
            echo "build_date=${build_date}"
          } >> "${GITHUB_OUTPUT}"

      - name: Require draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 24); do
            release_json="$(gh release view "${VERSION}" --json isDraft,isPrerelease,name 2>/dev/null || true)"
            if [[ -n "${release_json}" ]]; then
              if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
                echo "GitHub Release '${VERSION}' already exists but is not a draft." >&2
                echo "Release assets are immutable after publication; create releases through the release-tag workflow." >&2
                exit 1
              fi
              echo "Found draft GitHub Release ${VERSION}"
              exit 0
            fi
            sleep 5
          done
          echo "Draft GitHub Release '${VERSION}' not found after waiting." >&2
          echo "Merge the release-please PR and allow the Release Tag workflow to create the signed tag and draft release." >&2
          exit 1

      - name: Build release artifacts
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        run: |
          make release-artifacts \
            VERSION="${{ steps.release.outputs.version }}" \
            COMMIT="${{ steps.metadata.outputs.commit }}" \
            BUILD_DATE="${{ steps.metadata.outputs.build_date }}" \
            DIRTY=false

      - name: Build independent rebuild artifacts
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        run: |
          make release-artifacts \
            DIST_DIR=dist/rebuild \
            VERSION="${{ steps.release.outputs.version }}" \
            COMMIT="${{ steps.metadata.outputs.commit }}" \
            BUILD_DATE="${{ steps.metadata.outputs.build_date }}" \
            DIRTY=false

      - name: Verify release reproducibility
        run: PRIMARY_DIR=dist/release REBUILD_DIR=dist/rebuild bash hack/ci/verify-byte-reproducibility.sh

      - name: Write reproducibility report
        env:
          VERSION: ${{ steps.release.outputs.version }}
          COMMIT: ${{ steps.metadata.outputs.commit }}
          BUILD_DATE: ${{ steps.metadata.outputs.build_date }}
        run: |
          PRIMARY_DIR=dist/release \
          REBUILD_DIR=dist/rebuild \
          REPORT_PATH=dist/release/reproducibility-report.md \
          MIRROR_REPORT_PATH=dist/rebuild/reproducibility-report.md \
          bash hack/ci/write-reproducibility-report.sh
          cat dist/release/reproducibility-report.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Regenerate checksums with reproducibility report
        run: |
          make checksums DIST_DIR=dist/release
          make checksums DIST_DIR=dist/rebuild

      - name: Verify final release reproducibility
        run: PRIMARY_DIR=dist/release REBUILD_DIR=dist/rebuild bash hack/ci/verify-byte-reproducibility.sh

      - name: Verify checksums
        run: cd dist/release && shasum -a 256 -c checksums.txt

      - name: Run OpenBao release smoke test
        run: |
          make test-e2e-release-localstack \
            VERSION="${{ steps.release.outputs.version }}" \
            E2E_PLUGIN_VERSION="v${{ steps.release.outputs.version }}"

      - name: Run OpenBao OCI release smoke test
        run: |
          make test-e2e-oci-release-localstack \
            VERSION="${{ steps.release.outputs.version }}" \
            E2E_PLUGIN_VERSION="v${{ steps.release.outputs.version }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.4

      - name: Publish OCI plugin image
        id: oci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
          COMMIT: ${{ steps.metadata.outputs.commit }}
          BUILD_DATE: ${{ steps.metadata.outputs.build_date }}
        run: |
          set -euo pipefail
          image_name="ghcr.io/${REPO}"
          image_tag="v${VERSION}"
          image_ref="${image_name}:${image_tag}"
          platforms="linux/amd64,linux/arm64"

          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          make oci-plugin-image-push \
            OCI_IMAGE="${image_ref}" \
            OCI_IMAGE_PLATFORMS="${platforms}" \
            OCI_IMAGE_METADATA=dist/oci-plugin-image-metadata.json \
            OCI_IMAGE_SOURCE="https://github.com/${REPO}" \
            VERSION="${VERSION}" \
            COMMIT="${COMMIT}" \
            BUILD_DATE="${BUILD_DATE}" \
            DIRTY=false

          digest="$(jq -r '."containerimage.digest" // empty' dist/oci-plugin-image-metadata.json)"
          if [[ -z "${digest}" || "${digest}" == "null" ]]; then
            echo "OCI image digest missing from buildx metadata." >&2
            cat dist/oci-plugin-image-metadata.json >&2
            exit 1
          fi

          {
            echo "name=${image_name}"
            echo "tag=${image_tag}"
            echo "ref=${image_ref}"
            echo "digest=${digest}"
            echo "platforms=${platforms}"
          } >> "${GITHUB_OUTPUT}"

      - name: Scan OCI plugin image
        run: make security-scan-image OCI_IMAGE="${{ steps.oci.outputs.name }}@${{ steps.oci.outputs.digest }}"

      - name: Sign OCI plugin image
        run: cosign sign --yes --new-bundle-format=true "${{ steps.oci.outputs.name }}@${{ steps.oci.outputs.digest }}"

      - name: Verify OCI plugin image signature
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          cosign verify \
            --new-bundle-format=true \
            --certificate-identity "https://github.com/${WORKFLOW_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.oci.outputs.name }}@${{ steps.oci.outputs.digest }}" >/dev/null

      - name: Attest OCI plugin image provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.oci.outputs.name }}
          subject-digest: ${{ steps.oci.outputs.digest }}
          push-to-registry: true

      - name: Attest checksums provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release/checksums.txt

      - name: Attest release asset provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/release/checksums.txt

      - name: Record private dry-run attestation limitation
        if: ${{ github.event.repository.private }}
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          GitHub release artifact and OCI image attestations were skipped because this is a private repository dry run. Public release tags must run with attestations enabled.
          EOF

      - name: Sign release checksums
        run: |
          cosign sign-blob \
            --yes \
            --new-bundle-format=true \
            --bundle dist/release/checksums.txt.bundle \
            dist/release/checksums.txt

      - name: Verify release checksums signature
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          cosign verify-blob \
            --new-bundle-format=true \
            --bundle dist/release/checksums.txt.bundle \
            --certificate-identity "https://github.com/${WORKFLOW_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/release/checksums.txt >/dev/null

      - name: Verify release asset attestations
        if: ${{ !github.event.repository.private }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
          SOURCE_REF: ${{ github.ref }}
        run: bash hack/ci/verify-release-artifact-attestations.sh

      - name: Verify OCI plugin image attestation
        if: ${{ !github.event.repository.private }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
          OCI_IMAGE_NAME: ${{ steps.oci.outputs.name }}
          OCI_IMAGE_DIGEST: ${{ steps.oci.outputs.digest }}
          SOURCE_REF: ${{ github.ref }}
        run: bash hack/ci/verify-oci-image-attestation.sh

      - name: Generate provenance index
        env:
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.release.outputs.version }}
          PLUGIN_VERSION: v${{ steps.release.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
          RELEASE_WORKFLOW: ${{ github.workflow_ref }}
          OCI_IMAGE_REF: ${{ steps.oci.outputs.ref }}
          OCI_IMAGE_DIGEST: ${{ steps.oci.outputs.digest }}
          OCI_IMAGE_PLATFORMS: ${{ steps.oci.outputs.platforms }}
          ATTESTATIONS_AVAILABLE: ${{ !github.event.repository.private }}
        run: |
          set -euo pipefail
          reason=""
          if [[ "${ATTESTATIONS_AVAILABLE}" != "true" ]]; then
            reason="GitHub artifact and OCI image attestations were skipped for a private repository dry run."
          fi
          ATTESTATIONS_UNAVAILABLE_REASON="${reason}" bash hack/ci/generate-provenance-index.sh
          jq '.release, .checksums, .reproducibility, .attestations, .oci_plugin_image' \
            dist/release/provenance-index.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-plugin-artifacts-${{ steps.release.outputs.version }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "${VERSION}" --json isDraft,assets)"
          release_is_draft="$(jq -r '.isDraft' <<<"${release_json}")"
          declare -A existing_asset_sizes=()
          while IFS=$'\t' read -r name size; do
            if [[ -n "${name}" ]]; then
              existing_asset_sizes["${name}"]="${size}"
            fi
          done < <(jq -r '.assets[]? | [.name, (.size|tostring)] | @tsv' <<<"${release_json}")

          tmp_existing="$(mktemp -d)"
          trap 'rm -rf "${tmp_existing}"' EXIT

          shopt -s nullglob
          to_upload=()
          for file in dist/release/*; do
            name="$(basename "${file}")"
            if [[ -n "${existing_asset_sizes[${name}]-}" ]]; then
              local_size="$(stat -c%s "${file}")"
              if [[ "${local_size}" != "${existing_asset_sizes[${name}]}" ]]; then
                echo "Release asset '${name}' already exists but size differs." >&2
                exit 1
              fi
              gh release download "${VERSION}" --pattern "${name}" --dir "${tmp_existing}"
              local_sha="$(sha256sum "${file}" | awk '{print $1}')"
              release_sha="$(sha256sum "${tmp_existing}/${name}" | awk '{print $1}')"
              if [[ "${local_sha}" != "${release_sha}" ]]; then
                echo "Release asset '${name}' already exists but content differs." >&2
                exit 1
              fi
              continue
            fi
            to_upload+=("${file}")
          done

          if (( ${#to_upload[@]} > 0 )); then
            if [[ "${release_is_draft}" != "true" ]]; then
              echo "Release '${VERSION}' is already published and missing one or more local assets." >&2
              echo "Refusing to mutate a published release." >&2
              exit 1
            fi
            gh release upload "${VERSION}" "${to_upload[@]}"
          fi
